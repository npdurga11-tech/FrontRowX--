services:
  - type: web
    name: frontrowx-backend
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: npdurga11@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@frontrowx.com

  - type: worker
    name: frontrowx-celery-worker
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: frontrowx-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: npdurga11@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@frontrowx.com

  - type: redis
    name: frontrowx-redis
    region: ohio
    plan: free
